<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tip Calculator</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#f4f6f8;
  margin:0;
  padding:14px;
}

button{
  padding:8px;
  border:none;
  border-radius:8px;
  background:#007aff;
  color:white;
  font-size:14px;
}

.mode-btn{
  width:100%;
  margin-bottom:10px;
}

.card{
  background:white;
  padding:12px;
  border-radius:12px;
  margin-bottom:14px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}

label{font-size:12px;color:#666;}
input{width:100%;padding:6px;font-size:14px;}
.result{
  margin-top:8px;
  font-size:13px;
  background:#f1f3f5;
  padding:8px;
  border-radius:8px;
}

.hidden{display:none;}

.calc-display{
  background:#111;
  color:#0f0;
  padding:10px;
  font-size:18px;
  border-radius:8px;
  margin-bottom:8px;
  word-break:break-all;
}

.calc-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
}

.calc-grid button{
  background:#333;
  color:white;
}
.copy-btn{
  background:#28a745;
  margin-top:6px;
}
</style>
</head>

<body>

<button class="mode-btn" onclick="toggleMode()">🔄 Mode Switch</button>

<!-- ================= TIP MODE ================= -->
<div id="tipMode">

<div class="card">
<h2>층별 팁 입력</h2>
<div class="grid-2">
  <div><label>1F Cash</label><input type="number" id="f1c"></div>
  <div><label>1F Card</label><input type="number" id="f1d"></div>
  <div><label>2F Cash</label><input type="number" id="f2c"></div>
  <div><label>2F Card</label><input type="number" id="f2d"></div>
  <div><label>3F Cash</label><input type="number" id="f3c"></div>
  <div><label>3F Card</label><input type="number" id="f3d"></div>
</div>
<label>Extra Tip</label>
<input type="number" id="extra">
</div>

<div class="card">
<h2>퍼센트 분배</h2>
<div class="grid-2">
  <div><label>100% 인원</label><input type="number" id="p100"></div>
  <div><label>50% 인원</label><input type="number" id="p50"></div>
  <div><label>30% 인원</label><input type="number" id="p30"></div>
  <div><label>25% 인원</label><input type="number" id="p25"></div>
</div>

<h3 style="font-size:14px;">추가 퍼센트</h3>
<div class="grid-3">
  <div><label>%</label><input type="number" id="cp1"></div>
  <div><label>인원</label><input type="number" id="cp1n"></div>
  <div></div>
  <div><label>%</label><input type="number" id="cp2"></div>
  <div><label>인원</label><input type="number" id="cp2n"></div>
  <div></div>
</div>

<div id="percentResult" class="result"></div>
</div>

</div>

<!-- ================= CALCULATOR MODE ================= -->
<div id="calcMode" class="hidden">

<div class="card">
<h2>간단 계산기</h2>
<div id="calcDisplay" class="calc-display">0</div>

<div class="calc-grid">
<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button onclick="press('/')">÷</button>

<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button onclick="press('*')">×</button>

<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button onclick="press('-')">-</button>

<button onclick="press('0')">0</button>
<button onclick="press('.')">.</button>
<button onclick="calculateCalc()">=</button>
<button onclick="press('+')">+</button>

<button onclick="clearCalc()">C</button>
</div>

<button class="copy-btn" onclick="copyResult()">📋 결과 복사</button>

</div>
</div>

<script>

let currentMode="tip";

function toggleMode(){
  if(currentMode==="tip"){
    document.getElementById("tipMode").classList.add("hidden");
    document.getElementById("calcMode").classList.remove("hidden");
    currentMode="calc";
  }else{
    document.getElementById("tipMode").classList.remove("hidden");
    document.getElementById("calcMode").classList.add("hidden");
    currentMode="tip";
  }
}

/* ---------------- TIP CALC ---------------- */

function val(id){return Number(document.getElementById(id).value)||0;}

function calculate(){
  const total=
    val("f1c")+val("f1d")+
    val("f2c")+val("f2d")+
    val("f3c")+val("f3d")+
    val("extra");

  const groups=[
    {coef:1,count:val("p100"),label:"100%"},
    {coef:0.5,count:val("p50"),label:"50%"},
    {coef:0.3,count:val("p30"),label:"30%"},
    {coef:0.25,count:val("p25"),label:"25%"},
    {coef:val("cp1")/100,count:val("cp1n"),label:val("cp1")+"%"},
    {coef:val("cp2")/100,count:val("cp2n"),label:val("cp2")+"%"},
  ];

  let totalCoef=0;
  groups.forEach(g=>{totalCoef+=g.coef*g.count;});

  let distributed=0;
  let html="총 팁: "+total+"<br>총 계수: "+totalCoef.toFixed(2)+"<br><br>";

  groups.forEach(g=>{
    if(g.count>0 && g.coef>0){
      const one=Math.floor((total/totalCoef)*g.coef);
      const sum=one*g.count;
      distributed+=sum;
      html+=`${g.label} → 1인 ${one} / 합 ${sum}<br>`;
    }
  });

  html+="<br>남은 금액: "+(total-distributed);
  document.getElementById("percentResult").innerHTML=html;
}

document.addEventListener("input",calculate);

/* ---------------- CALCULATOR ---------------- */

let expression="";

function press(val){
  expression+=val;
  document.getElementById("calcDisplay").innerText=expression;
}

function calculateCalc(){
  try{
    expression=eval(expression).toString();
  }catch{
    expression="Error";
  }
  document.getElementById("calcDisplay").innerText=expression;
}

function clearCalc(){
  expression="";
  document.getElementById("calcDisplay").innerText="0";
}

function copyResult(){
  navigator.clipboard.writeText(expression);
  alert("결과 복사됨!");
}

</script>

</body>
                                </html>
