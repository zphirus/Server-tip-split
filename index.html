<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tip Calculator Pro</title>

<style>
body{
  font-family:Arial;
  background:#f4f6f9;
  padding:20px;
}

.container{
  max-width:600px;
  margin:auto;
}

.card{
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
  margin-bottom:20px;
}

h2{
  margin-top:0;
}

input{
  width:100%;
  padding:10px;
  margin-top:5px;
  margin-bottom:15px;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#4CAF50;
  color:white;
  margin-bottom:10px;
}

.toggle{
  background:#333;
}

.result{
  background:#f1f1f1;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}

.grid-2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
</style>

</head>
<body>

<div class="container">

<button class="toggle" onclick="toggleMode()">계산기 / 팁계산 전환</button>

<div id="calculatorMode" style="display:none;">
  <div class="card">
    <h2>계산기</h2>
    <input type="text" id="calcInput" placeholder="예: 1000*0.7+50" oninput="calculateExpression()">
    <div class="result" id="calcResult">결과: </div>
    <button onclick="copyCalc()">결과 복사</button>
  </div>
</div>

<div id="tipMode">

  <div class="card">
    <h2>퍼센트 분배</h2>
    <input type="number" id="totalTip" placeholder="총 팁 입력">
    <div id="percentResult" class="result"></div>
  </div>

  <div class="card">
    <h2>시간 기준 분배</h2>

    <div class="grid-2">
      <div>
        <label>팁 1</label>
        <input type="number" id="timeTip1">
      </div>
      <div>
        <label>팁 2</label>
        <input type="number" id="timeTip2">
      </div>
    </div>

    <div id="timeContainer"></div>

    <button onclick="addTimeRow()">+ 사람 추가</button>

    <div id="timeResult" class="result"></div>

  </div>

</div>

</div>

<script>

const percents=[1,0.7,0.5,0.3,0.25];

function toggleMode(){
  const calc=document.getElementById("calculatorMode");
  const tip=document.getElementById("tipMode");

  if(calc.style.display==="none"){
    calc.style.display="block";
    tip.style.display="none";
  }else{
    calc.style.display="none";
    tip.style.display="block";
  }
}

function calculateExpression(){
  const input=document.getElementById("calcInput").value;
  try{
    const result=eval(input)||0;
    document.getElementById("calcResult").innerHTML="결과: "+result;
  }catch{
    document.getElementById("calcResult").innerHTML="결과: 오류";
  }
}

function copyCalc(){
  const text=document.getElementById("calcResult").innerText.replace("결과: ","");
  navigator.clipboard.writeText(text);
}

document.getElementById("totalTip").addEventListener("input",calculatePercent);

function calculatePercent(){
  const total=Number(document.getElementById("totalTip").value)||0;
  let html="";
  percents.forEach(p=>{
    html+=`<div>${p*100}% → ${Math.floor(total*p)}</div>`;
  });
  document.getElementById("percentResult").innerHTML=html;
}

let timeCount=0;
const maxTimePeople=10;

function addTimeRow(){
  if(timeCount>=maxTimePeople) return;

  const div=document.createElement("div");
  div.className="grid-2";
  div.innerHTML=`
    <div>
      <label>시간</label>
      <input type="number" class="timeHours" oninput="calculateTime()">
    </div>
    <div>
      <label>인원</label>
      <input type="number" class="timePeople" oninput="calculateTime()">
    </div>
  `;
  document.getElementById("timeContainer").appendChild(div);
  timeCount++;
}

document.getElementById("timeTip1").addEventListener("input",calculateTime);
document.getElementById("timeTip2").addEventListener("input",calculateTime);

function calculateTime(){

  const tip1=Number(document.getElementById("timeTip1").value)||0;
  const tip2=Number(document.getElementById("timeTip2").value)||0;
  const total=tip1+tip2;

  const hourInputs=[...document.querySelectorAll(".timeHours")];
  const peopleInputs=[...document.querySelectorAll(".timePeople")];

  let totalHours=0;

  for(let i=0;i<hourInputs.length;i++){
    const hours=Number(hourInputs[i].value)||0;
    const people=Number(peopleInputs[i].value)||0;
    totalHours+=hours*people;
  }

  if(totalHours===0){
    document.getElementById("timeResult").innerHTML="";
    return;
  }

  const perHour=Math.floor(total/totalHours);

  let distributed=0;
  let html=`총 팁 합계: ${total}<br>`;
  html+=`총 시간: ${totalHours}<br>`;
  html+=`시간당 금액: ${perHour}<br><br>`;

  for(let i=0;i<hourInputs.length;i++){
    const hours=Number(hourInputs[i].value)||0;
    const people=Number(peopleInputs[i].value)||0;

    if(hours>0 && people>0){
      const amount=perHour*hours;
      const groupTotal=amount*people;
      distributed+=groupTotal;

      html+=`${hours}h / ${people}명 → 1인 ${amount} / 합 ${groupTotal}<br>`;
    }
  }

  html+=`<br>남은 금액: ${total-distributed}`;

  document.getElementById("timeResult").innerHTML=html;
}

addTimeRow();

</script>

</body>
</html>
