<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tip Pro</title>

<style>
:root{
  --bg:#f6f8fc;
  --card:#ffffff;
  --primary:#4f46e5;
  --primarySoft:#eef2ff;
  --text:#111827;
  --sub:#6b7280;
  --border:#e5e7eb;
  --success:#10b981;
  --operator:#f59e0b;
}

body{
  margin:0;
  padding:20px;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
  background:var(--bg);
  color:var(--text);
  max-width:480px;
  margin:auto;
}

/* Header */
.header{
  font-size:20px;
  font-weight:700;
  margin-bottom:16px;
}

.mode-btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#4f46e5,#6366f1);
  color:white;
  font-weight:600;
  margin-bottom:20px;
  box-shadow:0 8px 20px rgba(79,70,229,.25);
}

/* Cards */
.card{
  background:var(--card);
  border-radius:20px;
  padding:18px;
  margin-bottom:18px;
  box-shadow:0 10px 30px rgba(0,0,0,.06);
}

.card-title{
  font-size:14px;
  font-weight:700;
  margin-bottom:14px;
  color:var(--sub);
  letter-spacing:.5px;
}

/* Floor Input */
.floor-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.floor-row label{
  font-size:13px;
  font-weight:600;
}

.input-group{
  display:flex;
  gap:8px;
}

input{
  width:55px;
  padding:6px;
  border-radius:10px;
  border:1px solid var(--border);
  text-align:right;
  font-size:13px;
  transition:.15s;
}

input:focus{
  outline:none;
  border-color:var(--primary);
  box-shadow:0 0 0 2px rgba(79,70,229,.15);
}

/* Percent */
.percent-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.stepper{
  display:flex;
  gap:6px;
  align-items:center;
}

.stepper button{
  width:26px;
  height:26px;
  border:none;
  border-radius:8px;
  background:#f3f4f6;
  font-weight:700;
}

.stepper input{
  width:40px;
  text-align:center;
}

/* Result Card */
.result{
  background:var(--primarySoft);
  padding:14px;
  border-radius:14px;
  font-size:13px;
  margin-top:12px;
}

/* Time Section */
.time-row{
  display:flex;
  gap:10px;
  margin-bottom:8px;
}

.add-btn{
  width:100%;
  padding:10px;
  border-radius:12px;
  border:none;
  background:#f3f4f6;
  font-weight:600;
  margin-top:8px;
}

/* Calculator */
#calcMode{
  min-height:80vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.calc-display{
  background:#111827;
  color:#22c55e;
  padding:18px;
  font-size:24px;
  border-radius:18px;
  margin-bottom:8px;
  text-align:right;
}

.calc-preview{
  background:#f3f4f6;
  padding:10px;
  border-radius:12px;
  font-size:13px;
  margin-bottom:14px;
  text-align:right;
}

.calc-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.calc-grid button{
  height:60px;
  border-radius:16px;
  border:none;
  font-size:18px;
  font-weight:600;
  background:#f3f4f6;
}

.operator{background:var(--operator);color:white;}
.equal{background:var(--success);color:white;}

.copy-btn{
  width:100%;
  padding:12px;
  border-radius:14px;
  border:none;
  background:var(--primary);
  color:white;
  font-weight:600;
  margin-top:12px;
}

.hidden{display:none}
</style>
</head>

<body>

<div class="header">Tip Pro Dashboard</div>
<button class="mode-btn" onclick="toggleMode()">🔄 Mode Switch</button>

<!-- TIP MODE -->
<div id="tipMode">

<div class="card">
<div class="card-title">층별 팁 입력</div>

<div class="floor-row">
<label>1층</label>
<div class="input-group">
<input type="number" id="f1c" placeholder="Cash">
<input type="number" id="f1d" placeholder="Card">
</div>
</div>

<div class="floor-row">
<label>2층</label>
<div class="input-group">
<input type="number" id="f2c">
<input type="number" id="f2d">
</div>
</div>

<div class="floor-row">
<label>3층</label>
<div class="input-group">
<input type="number" id="f3c">
<input type="number" id="f3d">
</div>
</div>

<div class="floor-row">
<label>Extra</label>
<input type="number" id="extra">
</div>
</div>

<div class="card">
<div class="card-title">퍼센트 분배</div>

<div class="percent-row">
100%
<div class="stepper">
<button onclick="stepDown('p100')">−</button>
<input type="number" id="p100">
<button onclick="stepUp('p100')">+</button>
</div>
</div>

<div class="percent-row">
50%
<div class="stepper">
<button onclick="stepDown('p50')">−</button>
<input type="number" id="p50">
<button onclick="stepUp('p50')">+</button>
</div>
</div>

<div class="percent-row">
30%
<div class="stepper">
<button onclick="stepDown('p30')">−</button>
<input type="number" id="p30">
<button onclick="stepUp('p30')">+</button>
</div>
</div>

<div class="percent-row">
25%
<div class="stepper">
<button onclick="stepDown('p25')">−</button>
<input type="number" id="p25">
<button onclick="stepUp('p25')">+</button>
</div>
</div>

<hr>

<div class="percent-row">
<input type="number" id="cp1" placeholder="%">
<div class="stepper">
<button onclick="stepDown('cp1n')">−</button>
<input type="number" id="cp1n" placeholder="인원">
<button onclick="stepUp('cp1n')">+</button>
</div>
</div>

<div class="percent-row">
<input type="number" id="cp2" placeholder="%">
<div class="stepper">
<button onclick="stepDown('cp2n')">−</button>
<input type="number" id="cp2n" placeholder="인원">
<button onclick="stepUp('cp2n')">+</button>
</div>
</div>

<div id="percentResult" class="result"></div>
</div>

<div class="card">
<div class="card-title">시간 기준 분배</div>

<div class="floor-row">
<label>총 팁</label>
<input type="number" id="timeTotal">
</div>

<div id="timeContainer"></div>

<button class="add-btn" onclick="addTimeRow()">+ 사람 추가</button>

<div id="timeResult" class="result"></div>
</div>

</div>

<!-- CALC MODE -->
<div id="calcMode" class="hidden">
<div class="card" style="width:100%;max-width:420px;">
<div class="calc-display" id="calcDisplay">0</div>
<div class="calc-preview" id="calcPreview">= 0</div>

<div class="calc-grid">
<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button class="operator" onclick="press('/')">÷</button>

<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button class="operator" onclick="press('*')">×</button>

<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button class="operator" onclick="press('-')">-</button>

<button onclick="press('0')">0</button>
<button onclick="press('.')">.</button>
<button class="operator" onclick="press('+')">+</button>
<button class="equal" onclick="calculateFinal()">=</button>

<button onclick="clearCalc()">C</button>
<button onclick="backspace()">⌫</button>
</div>

<button class="copy-btn" onclick="copyResult()">결과 복사</button>
</div>
</div>

<script>
function toggleMode(){
  tipMode.classList.toggle("hidden");
  calcMode.classList.toggle("hidden");
}

/* ===== 공통 ===== */
function val(id){
  return Number(document.getElementById(id)?.value) || 0;
}

document.addEventListener("input",()=>{
  calculate();
  calculateTime();
});

/* ============================= */
/* ===== 퍼센트 분배 영역 ===== */
/* ============================= */

/* + - 버튼 작동 */
function changeCount(id, delta){
  const input = document.getElementById(id);
  let current = Number(input.value) || 0;
  current += delta;
  if(current < 0) current = 0;
  input.value = current;
  calculate();
}

/* 계산 */
function calculate(){
  const total =
    val("f1c")+val("f1d")+
    val("f2c")+val("f2d")+
    val("f3c")+val("f3d")+
    val("extra");

  const groups=[
    {coef:1,count:val("p100"),label:"100%"},
    {coef:0.5,count:val("p50"),label:"50%"},
    {coef:0.3,count:val("p30"),label:"30%"},
    {coef:0.25,count:val("p25"),label:"25%"},
    {coef:val("cp1")/100,count:val("cp1n"),label:(val("cp1")||0)+"%"},
    {coef:val("cp2")/100,count:val("cp2n"),label:(val("cp2")||0)+"%"},
  ];

  let totalCoef=0;
  groups.forEach(g=>{
    if(g.count>0 && g.coef>0){
      totalCoef += g.coef * g.count;
    }
  });

  if(totalCoef === 0 || total === 0){
    percentResult.innerHTML="";
    return;
  }

  let html=`총 팁: ${total}<br>`;
  html+=`총 퍼센트 계수: ${totalCoef.toFixed(2)}<br><br>`;

  groups.forEach(g=>{
    if(g.count>0 && g.coef>0){
      const one = Math.floor((total/totalCoef)*g.coef);
      const groupSum = one * g.count;
      html += `
        ${g.label} (${g.count}명)<br>
        → 1인 ${one}<br>
        → 해당 퍼센트 총합 ${groupSum}<br><br>
      `;
    }
  });

  percentResult.innerHTML=html;
}

/* ============================= */
/* ===== 시간 기준 분배 ===== */
/* ============================= */

function addTimeRow(){
  const container = document.getElementById("timeContainer");

  const div = document.createElement("div");
  div.className = "time-row";

  div.innerHTML = `
    <input type="number" class="timeHours" placeholder="시간">
    <input type="number" class="timePeople" placeholder="인원">
  `;

  container.appendChild(div);
}

function calculateTime(){
  const total = val("timeTotal");
  const hoursInputs = document.querySelectorAll(".timeHours");
  const peopleInputs = document.querySelectorAll(".timePeople");

  let totalHours = 0;

  for(let i=0;i<hoursInputs.length;i++){
    const hours = Number(hoursInputs[i].value) || 0;
    const people = Number(peopleInputs[i].value) || 0;
    totalHours += hours * people;
  }

  if(totalHours === 0 || total === 0){
    timeResult.innerHTML="";
    return;
  }

  const perHour = Math.floor(total / totalHours);

  let html = `총 근무시간: ${totalHours}<br>`;
  html += `시간당 금액: ${perHour}<br><br>`;

  for(let i=0;i<hoursInputs.length;i++){
    const hours = Number(hoursInputs[i].value) || 0;
    const people = Number(peopleInputs[i].value) || 0;

    if(hours>0 && people>0){
      const one = perHour * hours;
      html += `${hours}시간 / ${people}명 → 1인 ${one}<br>`;
    }
  }

  timeResult.innerHTML = html;
}

/* ============================= */
/* ===== 계산기 ===== */
/* ============================= */

let expression="";

function press(v){
  expression += v;
  updateCalc();
}

function updateCalc(){
  calcDisplay.innerText = expression || "0";
  try{
    calcPreview.innerText = "= " + eval(expression);
  }catch{
    calcPreview.innerText = "= ?";
  }
}

function calculateFinal(){
  try{
    expression = eval(expression).toString();
  }catch{
    expression="Error";
  }
  updateCalc();
}

function clearCalc(){
  expression="";
  updateCalc();
}

function backspace(){
  expression = expression.slice(0,-1);
  updateCalc();
}

function copyResult(){
  navigator.clipboard.writeText(expression);
}
</script>
</script>

</body>
</html>
