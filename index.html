<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tip Pro</title>
<style>
:root{
  --bg:#f6f8fc;
  --card:#ffffff;
  --primary:#4f46e5;
  --primarySoft:#eef2ff;
  --text:#111827;
  --sub:#6b7280;
  --border:#e5e7eb;
  --success:#10b981;
  --operator:#f59e0b;
}
body{
  margin:0;
  padding:20px;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
  background:var(--bg);
  color:var(--text);
  max-width:480px;
  margin:auto;
}
.header{font-size:20px;font-weight:700;margin-bottom:16px;}
.mode-btn{width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,#4f46e5,#6366f1);color:white;font-weight:600;margin-bottom:20px;box-shadow:0 8px 20px rgba(79,70,229,.25);}
.card{background:var(--card);border-radius:20px;padding:18px;margin-bottom:18px;box-shadow:0 10px 30px rgba(0,0,0,.06);}
.card-title{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--sub);letter-spacing:.5px;}
.floor-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.floor-row label{font-size:13px;font-weight:600;}
.input-group{display:flex;gap:8px;}
input{width:55px;padding:6px;border-radius:10px;border:1px solid var(--border);text-align:right;font-size:13px;transition:.15s;}
input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px rgba(79,70,229,.15);}
.percent-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.stepper{display:flex;gap:6px;align-items:center;}
.stepper button{width:26px;height:26px;border:none;border-radius:8px;background:#f3f4f6;font-weight:700;}
.stepper input{width:40px;text-align:center;}
.result{background:var(--primarySoft);padding:14px;border-radius:14px;font-size:13px;margin-top:12px;}
.time-row{display:flex;gap:10px;margin-bottom:8px;}
.add-btn{width:100%;padding:10px;border-radius:12px;border:none;background:#f3f4f6;font-weight:600;margin-top:8px;}
#calcMode{min-height:80vh;display:flex;justify-content:center;align-items:center;}
.calc-display{background:#111827;color:#22c55e;padding:18px;font-size:24px;border-radius:18px;margin-bottom:8px;text-align:right;}
.calc-preview{background:#f3f4f6;padding:10px;border-radius:12px;font-size:13px;margin-bottom:14px;text-align:right;}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.calc-grid button{height:60px;border-radius:16px;border:none;font-size:22px;font-weight:600;background:#f3f4f6;}
.operator{background:#d98c2b;color:white;}
.equal{background:var(--success);color:white;}
.copy-btn{width:100%;padding:12px;border-radius:14px;border:none;background:var(--primary);color:white;font-weight:600;margin-top:12px;}
.calc-btn{font-size:22px;}
.hidden{display:none;}
</style>
</head>
<body>

<div class="header">Tip Pro Dashboard</div>
<button class="mode-btn" onclick="toggleMode()">🔄 Mode Switch</button>

<div id="tipMode">

<!-- Morning Tip -->
<div class="card">
  <div class="card-title">Morning 팁 입력 (1,2층)</div>

  <div class="floor-row">
    <label>1층</label>
    <div class="input-group">
      <input type="number" id="m1c" placeholder="Cash">
      <input type="number" id="m1d" placeholder="Card">
    </div>
  </div>
  <div class="floor-row">
    <label>2층</label>
    <div class="input-group">
      <input type="number" id="m2c" placeholder="Cash">
      <input type="number" id="m2d" placeholder="Card">
    </div>
  </div>

  <div class="card-title">Morning 퍼센트 기반 서버수</div>
  <div id="mPercentContainer">
    <div class="percent-row">100%<div class="stepper"><button onclick="mStepDown('mp100')">−</button><input type="number" id="mp100"><button onclick="mStepUp('mp100')">+</button></div></div>
    <div class="percent-row">50%<div class="stepper"><button onclick="mStepDown('mp50')">−</button><input type="number" id="mp50"><button onclick="mStepUp('mp50')">+</button></div></div>
    <div class="percent-row">30%<div class="stepper"><button onclick="mStepDown('mp30')">−</button><input type="number" id="mp30"><button onclick="mStepUp('mp30')">+</button></div></div>
    <div class="percent-row">25%<div class="stepper"><button onclick="mStepDown('mp25')">−</button><input type="number" id="mp25"><button onclick="mStepUp('mp25')">+</button></div></div>
  </div>
  <button class="add-btn" onclick="addMCustomPercent()">+ 커스텀 퍼센트 추가</button>
  <div id="mPercentResult" class="result"></div>
</div>

<!-- Afternoon Tip -->
<div class="card">
  <div class="card-title">Afternoon 팁 입력 (1,2,3층)</div>

  <div class="floor-row">
    <label>1층</label>
    <div class="input-group">
      <input type="number" id="a1c" placeholder="Cash">
      <input type="number" id="a1d" placeholder="Card">
    </div>
  </div>
  <div class="floor-row">
    <label>2층</label>
    <div class="input-group">
      <input type="number" id="a2c" placeholder="Cash">
      <input type="number" id="a2d" placeholder="Card">
    </div>
  </div>
  <div class="floor-row">
    <label>3층</label>
    <div class="input-group">
      <input type="number" id="a3c" placeholder="Cash">
      <input type="number" id="a3d" placeholder="Card">
    </div>
  </div>

  <div class="card-title">Afternoon 퍼센트 기반 서버수</div>
  <div id="aPercentContainer">
    <div class="percent-row">100%<div class="stepper"><button onclick="aStepDown('ap100')">−</button><input type="number" id="ap100"><button onclick="aStepUp('ap100')">+</button></div></div>
    <div class="percent-row">50%<div class="stepper"><button onclick="aStepDown('ap50')">−</button><input type="number" id="ap50"><button onclick="aStepUp('ap50')">+</button></div></div>
    <div class="percent-row">30%<div class="stepper"><button onclick="aStepDown('ap30')">−</button><input type="number" id="ap30"><button onclick="aStepUp('ap30')">+</button></div></div>
    <div class="percent-row">25%<div class="stepper"><button onclick="aStepDown('ap25')">−</button><input type="number" id="ap25"><button onclick="aStepUp('ap25')">+</button></div></div>
  </div>
  <button class="add-btn" onclick="addACustomPercent()">+ 커스텀 퍼센트 추가</button>
  <div id="aPercentResult" class="result"></div>
</div>

</div>

<!-- CALC MODE -->
<div id="calcMode" class="hidden">
  <div class="card" style="width:100%;max-width:420px;">
    <div class="calc-display" id="calcDisplay">0</div>
    <div class="calc-preview" id="calcPreview">= 0</div>
    <div class="calc-grid">
      <button onclick="press('7')">7</button>
      <button onclick="press('8')">8</button>
      <button onclick="press('9')">9</button>
      <button class="operator" onclick="press('/')">÷</button>
      <button onclick="press('4')">4</button>
      <button onclick="press('5')">5</button>
      <button onclick="press('6')">6</button>
      <button class="operator" onclick="press('*')">×</button>
      <button onclick="press('1')">1</button>
      <button onclick="press('2')">2</button>
      <button onclick="press('3')">3</button>
      <button class="operator" onclick="press('-')">-</button>
      <button onclick="press('0')">0</button>
      <button onclick="press('.')">.</button>
      <button class="operator" onclick="press('+')">+</button>
      <button class="equal" onclick="calculateFinal()">=</button>
      <button onclick="clearCalc()">C</button>
      <button onclick="backspace()">⌫</button>
    </div>
    <button class="copy-btn" onclick="copyResult()">결과 복사</button>
  </div>
</div>

<script>
function toggleMode(){ tipMode.classList.toggle("hidden"); calcMode.classList.toggle("hidden"); }
function val(id){ return Number(document.getElementById(id)?.value)||0; }

/* Morning 퍼센트 */
let mCustomCount=0;
function mStepUp(id){const input=document.getElementById(id); input.value=(Number(input.value)||0)+1; mCalculate();}
function mStepDown(id){const input=document.getElementById(id); input.value=Math.max((Number(input.value)||0)-1,0); mCalculate();}
function addMCustomPercent(){ if(mCustomCount>=6) return; mCustomCount++; const container=document.getElementById("mPercentContainer"); const div=document.createElement("div"); div.className="percent-row"; div.innerHTML=`<input type="number" id="mcp${mCustomCount}" placeholder="%"><div class="stepper"><button onclick="mStepDown('mcpn${mCustomCount}')">−</button><input type="number" id="mcpn${mCustomCount}" placeholder="인원"><button onclick="mStepUp('mcpn${mCustomCount}')">+</button></div>`; container.appendChild(div);}
function mCalculate(){
  const total=val("m1c")+val("m1d")+val("m2c")+val("m2d");
  let groups=[
    {coef:1,count:val("mp100"),label:"100%"},
    {coef:0.5,count:val("mp50"),label:"50%"},
    {coef:0.3,count:val("mp30"),label:"30%"},
    {coef:0.25,count:val("mp25"),label:"25%"}
  ];
  for(let i=1;i<=mCustomCount;i++){
    const cval=val("mcp"+i); const cnum=val("mcpn"+i);
    if(cval>0 && cnum>0) groups.push({coef:cval/100,count:cnum,label:cval+"%"});
  }
  groups.sort((a,b)=>b.coef-a.coef);
  let totalCoef=0; groups.forEach(g=>totalCoef+=g.coef*g.count);
  if(totalCoef===0||total===0){ mPercentResult.innerHTML=""; return;}
  let distributedTotal=0; let html=`총 Morning 팁: ${total}<br>총 퍼센트 계수: ${totalCoef.toFixed(2)}<br><br>`;
  groups.forEach(g=>{
    const rawOne=(total/totalCoef)*g.coef; const one=Math.floor(rawOne); const groupSum=one*g.count; distributedTotal+=groupSum;
    html+=`${g.label} (${g.count}명)<br>→ 1인 ${one}<br>→ 총합 ${groupSum}<br><br>`;
  });
  const remainder=total-distributedTotal;
  html+=`<hr>총 지급합: ${distributedTotal}<br>남는 금액: ${remainder}`;
  mPercentResult.innerHTML=html;
}

/* Afternoon 퍼센트 */
let aCustomCount=0;
function aStepUp(id){const input=document.getElementById(id); input.value=(Number(input.value)||0)+1; aCalculate();}
function aStepDown(id){const input=document.getElementById(id); input.value=Math.max((Number(input.value)||0)-1,0); aCalculate();}
function addACustomPercent(){ if(aCustomCount>=6) return; aCustomCount++; const container=document.getElementById("aPercentContainer"); const div=document.createElement("div"); div.className="percent-row"; div.innerHTML=`<input type="number" id="acp${aCustomCount}" placeholder="%"><div class="stepper"><button onclick="aStepDown('acpn${aCustomCount}')">−</button><input type="number" id="acpn${aCustomCount}" placeholder="인원"><button onclick="aStepUp('acpn${aCustomCount}')">+</button></div>`; container.appendChild(div);}
function aCalculate(){
  const total=val("a1c")+val("a1d")+val("a2c")+val("a2d")+val("a3c")+val("a3d");
  const morningTotal=val("m1c")+val("m1d")+val("m2c")+val("m2d");
  const netTotal=Math.max(total-morningTotal,0);
  let groups=[
    {coef:1,count:val("ap100"),label:"100%"},
    {coef:0.5,count:val("ap50"),label:"50%"},
    {coef:0.3,count:val("ap30"),label:"30%"},
    {coef:0.25,count:val("ap25"),label:"25%"}
  ];
  for(let i=1;i<=aCustomCount;i++){
    const cval=val("acp"+i); const cnum=val("acpn"+i);
    if(cval>0 && cnum>0) groups.push({coef:cval/100,count:cnum,label:cval+"%"});
  }
  groups.sort((a,b)=>b.coef-a.coef);
  let totalCoef=0; groups.forEach(g=>totalCoef+=g.coef*g.count);
  if(totalCoef===0||netTotal===0){ aPercentResult.innerHTML=""; return;}
  let distributedTotal=0; let html=`총 Afternoon 팁(순수): ${netTotal}<br>총 퍼센트 계수: ${totalCoef.toFixed(2)}<br><br>`;
  groups.forEach(g=>{
    const rawOne=(netTotal/totalCoef)*g.coef; const one=Math.floor(rawOne); const groupSum=one*g.count; distributedTotal+=groupSum;
    html+=`${g.label} (${g.count}명)<br>→ 1인 ${one}<br>→ 총합 ${groupSum}<br><br>`;
  });
  const remainder=netTotal-distributedTotal;
  html+=`<hr>총 지급합: ${distributedTotal}<br>남는 금액: ${remainder}`;
  aPercentResult.innerHTML=html;
}

/* 계산기 공통 */
let expression="";
function press(v){const operators=["+","-","*","/"];if(operators.includes(v)){const lastChar=expression.slice(-1);if(operators.includes(lastChar)){expression=expression.slice(0,-1)+v;updateCalc();return;} if(expression==="") return;} if(v==="."){const parts=expression.split(/[\+\-\*\/]/);if(parts[parts.length-1].includes(".")) return;} expression+=v;updateCalc();}
function updateCalc(){calcDisplay.innerText=expression||"0"; try{calcPreview.innerText="= "+eval(expression);}catch{calcPreview.innerText="= ?";}}
function calculateFinal(){try{expression=eval(expression).toString();}catch{expression="Error";}updateCalc();}
function clearCalc(){expression=""; updateCalc();}
function backspace(){expression=expression.slice(0,-1); updateCalc();}
function copyResult(){navigator.clipboard.writeText(expression);}
</script>

</body>
</html>
