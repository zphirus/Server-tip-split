<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tip Pro</title>

<style>

 :root{
  --bg:#f5f7fb;
  --card:#ffffffcc;
  --border:#e6e9f0;
  --accent:#4f46e5;
  --accent-soft:rgba(79,70,229,.15);
  --text:#1e293b;
  --sub:#6b7280;
}

/* ===== Background (밝게 변경) ===== */
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
  margin:0;
  padding:20px;
  background:var(--bg);
  color:var(--text);
}

/* ===== Mode Button ===== */
.mode-btn{
  width:100%;
  margin-bottom:18px;
  background:var(--accent);
  color:white;
  font-weight:700;
  border:none;
  padding:11px;
  border-radius:14px;
  cursor:pointer;
  transition:.2s cubic-bezier(.4,0,.2,1);
  box-shadow:0 8px 20px rgba(79,70,229,.25);
}

.mode-btn:hover{
  transform:translateY(-3px);
  box-shadow:0 12px 28px rgba(79,70,229,.35);
}

.mode-btn:active{
  transform:scale(.96);
  box-shadow:0 4px 12px rgba(79,70,229,.2);
}

/* ===== Cards ===== */
.card{
  background:var(--card);
  backdrop-filter:blur(14px);
  padding:18px;
  border-radius:20px;
  margin-bottom:18px;
  border:1px solid var(--border);
  box-shadow:0 10px 30px rgba(0,0,0,.05);
  transition:.25s ease;
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:0 18px 40px rgba(0,0,0,.08);
}

/* ===== Grid ===== */
.grid-2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.grid-3{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
}

/* ===== Labels ===== */
label{
  font-size:10px;
  color:var(--sub);
  font-weight:600;
}

/* ===== Inputs (크기 축소) ===== */
input{
  width:100%;
  padding:7px 8px;   /* ↓ 줄임 */
  font-size:13px;    /* ↓ 줄임 */
  border-radius:10px;
  border:1px solid var(--border);
  background:white;
  transition:.2s ease;
}

input:focus{
  outline:none;
  border:1px solid var(--accent);
  box-shadow:0 0 0 3px var(--accent-soft);
}

/* ===== Result ===== */
.result{
  margin-top:12px;
  font-size:12px;
  padding:12px;
  border-radius:12px;
  background:#f9fafc;
  border:1px solid var(--border);
  line-height:1.5;
}

.hidden{display:none}

/* ===== Calculator ===== */
.calc-display{
  background:#111827;
  color:#22c55e;
  padding:14px;
  font-size:20px;
  border-radius:14px;
  margin-bottom:6px;
}

.calc-preview{
  background:#f3f4f6;
  padding:10px;
  font-size:13px;
  border-radius:12px;
  margin-bottom:14px;
  color:#374151;
}

/* ===== Calculator Grid ===== */
.calc-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

/* ===== Strong Button Interaction ===== */
.calc-grid button{
  background:white;
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px 0;
  font-size:16px;
  cursor:pointer;
  transition:all .15s ease;
  box-shadow:0 4px 10px rgba(0,0,0,.05);
}

.calc-grid button:hover{
  transform:translateY(-3px);
  box-shadow:0 8px 18px rgba(0,0,0,.1);
}

.calc-grid button:active{
  transform:scale(.93);
  box-shadow:inset 0 4px 8px rgba(0,0,0,.15);
}

/* Copy Button */
.copy-btn{
  margin-top:14px;
  background:var(--accent);
  color:white;
  width:100%;
  padding:11px;
  border-radius:14px;
  font-weight:700;
  border:none;
  cursor:pointer;
  transition:.2s ease;
  box-shadow:0 8px 20px rgba(79,70,229,.25);
}

.copy-btn:hover{
  transform:translateY(-3px);
}

.copy-btn:active{
  transform:scale(.95);
}
</style>
</head>

<body>

<button class="mode-btn" onclick="toggleMode()">🔄 Mode Switch</button>

<!-- ================= TIP MODE ================= -->
<div id="tipMode">

<div class="card">
<h2>층별 팁 입력</h2>
<div class="grid-2">
<div><label>1F Cash</label><input type="number" id="f1c"></div>
<div><label>1F Card</label><input type="number" id="f1d"></div>
<div><label>2F Cash</label><input type="number" id="f2c"></div>
<div><label>2F Card</label><input type="number" id="f2d"></div>
<div><label>3F Cash</label><input type="number" id="f3c"></div>
<div><label>3F Card</label><input type="number" id="f3d"></div>
</div>
<label>Extra Tip</label>
<input type="number" id="extra">
</div>

<div class="card">
<h2>퍼센트 분배</h2>
<div class="grid-2">
<div><label>100% 인원</label><input type="number" id="p100"></div>
<div><label>50% 인원</label><input type="number" id="p50"></div>
<div><label>30% 인원</label><input type="number" id="p30"></div>
<div><label>25% 인원</label><input type="number" id="p25"></div>
</div>

<h3 style="font-size:13px;margin-top:10px;">추가 퍼센트</h3>
<div class="grid-3">
<div><label>%</label><input type="number" id="cp1"></div>
<div><label>인원</label><input type="number" id="cp1n"></div>
<div></div>
<div><label>%</label><input type="number" id="cp2"></div>
<div><label>인원</label><input type="number" id="cp2n"></div>
<div></div>
</div>

<div id="percentResult" class="result"></div>
</div>
  <div class="card">
<h2>시간 기준 분배</h2>

<label>총 팁</label>
<input type="number" id="timeTotal">

<div id="timeContainer"></div>

<button onclick="addTimeRow()">+ 사람 추가</button>

<div id="timeResult" class="result"></div>
</div>

</div>

<!-- ================= CALC MODE ================= -->
<div id="calcMode" class="hidden">

<div class="card">
<h2>계산기</h2>

<div id="calcDisplay" class="calc-display">0</div>
<div id="calcPreview" class="calc-preview">= 0</div>

<div class="calc-grid">
<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button onclick="press('/')">÷</button>

<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button onclick="press('*')">×</button>

<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button onclick="press('-')">-</button>

<button onclick="press('0')">0</button>
<button onclick="press('.')">.</button>
<button onclick="calculateFinal()">=</button>
<button onclick="press('+')">+</button>

<button onclick="clearCalc()">C</button>
  <button onclick="clearCalc()">C</button>
<button onclick="backspace()">⌫</button>
</div>

<button class="copy-btn" onclick="copyResult()">📋 결과 복사</button>

</div>
</div>

<script>
let currentMode="tip";
function toggleMode(){
  document.getElementById("tipMode").classList.toggle("hidden");
  document.getElementById("calcMode").classList.toggle("hidden");
}

/* -------- TIP -------- */
function val(id){return Number(document.getElementById(id).value)||0;}

function calculate(){
  const total=
    val("f1c")+val("f1d")+
    val("f2c")+val("f2d")+
    val("f3c")+val("f3d")+
    val("extra");

  const groups=[
    {coef:1,count:val("p100"),label:"100%"},
    {coef:0.5,count:val("p50"),label:"50%"},
    {coef:0.3,count:val("p30"),label:"30%"},
    {coef:0.25,count:val("p25"),label:"25%"},
    {coef:val("cp1")/100,count:val("cp1n"),label:val("cp1")+"%"},
    {coef:val("cp2")/100,count:val("cp2n"),label:val("cp2")+"%"},
  ];

  let totalCoef=0;
  groups.forEach(g=>{totalCoef+=g.coef*g.count;});

  let distributed=0;
  let html="총 팁: "+total+"<br>총 계수: "+totalCoef.toFixed(2)+"<br><br>";

  groups.forEach(g=>{
    if(g.count>0 && g.coef>0){
      const one=Math.floor((total/totalCoef)*g.coef);
      const sum=one*g.count;
      distributed+=sum;
      html+=`${g.label} → 1인 ${one} / 합 ${sum}<br>`;
    }
  });

  html+="<br>남은 금액: "+(total-distributed);
  document.getElementById("percentResult").innerHTML=html;
}
document.addEventListener("input",calculate);
let timeCount=0;
const maxTimePeople=8;

function addTimeRow(){
  if(timeCount>=maxTimePeople) return;

  const div=document.createElement("div");
  div.className="grid-2";
  div.innerHTML=`
    <div>
      <label>시간</label>
      <input type="number" class="timeHours">
    </div>
    <div>
      <label>인원</label>
      <input type="number" class="timePeople">
    </div>
  `;
  document.getElementById("timeContainer").appendChild(div);
  timeCount++;
}

function calculateTime(){

  const total=Number(document.getElementById("timeTotal").value)||0;
  const hourInputs=[...document.querySelectorAll(".timeHours")];
  const peopleInputs=[...document.querySelectorAll(".timePeople")];

  let totalHours=0;

  for(let i=0;i<hourInputs.length;i++){
    const hours=Number(hourInputs[i].value)||0;
    const people=Number(peopleInputs[i].value)||0;
    totalHours += hours*people;
  }

  if(totalHours===0){
    document.getElementById("timeResult").innerHTML="";
    return;
  }

  const perHour=Math.floor(total/totalHours);

  let distributed=0;
  let html=`총 시간: ${totalHours}<br>`;
  html+=`시간당 금액: ${perHour}<br><br>`;

  for(let i=0;i<hourInputs.length;i++){
    const hours=Number(hourInputs[i].value)||0;
    const people=Number(peopleInputs[i].value)||0;

    if(hours>0 && people>0){
      const amount=perHour*hours;
      const groupTotal=amount*people;
      distributed+=groupTotal;

      html+=`시간 ${hours}h / ${people}명 → 1인 ${amount} / 합 ${groupTotal}<br>`;
    }
  }

  html+=`<br>남은 금액: ${total-distributed}`;

  document.getElementById("timeResult").innerHTML=html;
}
 document.addEventListener("input", calculateTime);
/* -------- CALC -------- */
let expression="";

function press(val){
  expression+=val;
  updateCalc();
}

function updateCalc(){
  document.getElementById("calcDisplay").innerText=expression||"0";
  try{
    const preview=eval(expression);
    document.getElementById("calcPreview").innerText="= "+preview;
  }catch{
    document.getElementById("calcPreview").innerText="= ?";
  }
}

function calculateFinal(){
  try{
    expression=eval(expression).toString();
  }catch{
    expression="Error";
  }
  updateCalc();
}

function clearCalc(){
  expression="";
  updateCalc();
}
function backspace(){
  expression = expression.slice(0,-1);
  updateCalc();
}
function copyResult(){
  navigator.clipboard.writeText(expression);
  alert("결과 복사 완료");
}
</script>

</body>
</html>
