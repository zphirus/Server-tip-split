<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tip Pro</title>

<style>


;
/* ===== Modern Pro UI Upgrade ===== */

body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
  background:linear-gradient(135deg,#eef2f7,#dfe6ee);
  margin:0;
  padding:20px;
  color:#1a1a1a;
}

/* 헤더 */
h2{
  font-size:15px;
  margin-bottom:12px;
  font-weight:700;
  letter-spacing:-0.3px;
}

/* 버튼 공통 */
button{
  border:none;
  border-radius:14px;
  padding:10px;
  cursor:pointer;
  font-weight:600;
  transition:all .2s ease;
}

/* 모드 버튼 */
.mode-btn{
  width:100%;
  margin-bottom:18px;
  background:linear-gradient(135deg,#111,#333);
  color:white;
  font-weight:700;
  box-shadow:0 6px 18px rgba(0,0,0,0.15);
}

.mode-btn:active{
  transform:scale(.97);
}

/* 카드 */
.card{
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(12px);
  padding:18px;
  border-radius:22px;
  margin-bottom:18px;
  box-shadow:
    0 10px 30px rgba(0,0,0,0.08),
    inset 0 1px 0 rgba(255,255,255,0.6);
  border:1px solid rgba(255,255,255,0.6);
  transition:transform .2s ease;
}

.card:hover{
  transform:translateY(-3px);
}

/* Grid */
.grid-2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.grid-3{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
}

/* 라벨 */
label{
  font-size:11px;
  color:#666;
  font-weight:600;
  letter-spacing:.2px;
}

/* 인풋 */
input{
  width:100%;
  padding:10px;
  font-size:14px;
  border-radius:12px;
  border:1px solid #e2e6ed;
  background:#f8fafc;
  transition:all .2s ease;
}

input:focus{
  outline:none;
  border:1px solid #4a90e2;
  background:white;
  box-shadow:0 0 0 3px rgba(74,144,226,0.15);
}

/* 결과 박스 */
.result{
  margin-top:12px;
  font-size:13px;
  background:linear-gradient(135deg,#f7f9fc,#eef2f7);
  padding:14px;
  border-radius:14px;
  line-height:1.5;
  box-shadow:inset 0 1px 3px rgba(0,0,0,0.05);
}

.hidden{display:none}
/* ============================= */
/*        TIP PRO – PRO UI      */
/* ============================= */

:root{
  --bg1:#0f172a;
  --bg2:#1e293b;
  --accent:#4f46e5;
  --accent-soft:rgba(79,70,229,.15);
  --glass:rgba(255,255,255,.08);
  --glass-border:rgba(255,255,255,.15);
  --text:#f1f5f9;
  --sub:#94a3b8;
}

/* ===== Background ===== */

body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
  margin:0;
  padding:22px;
  color:var(--text);
  background:
    radial-gradient(circle at 20% 20%, #1e293b 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, #312e81 0%, transparent 40%),
    linear-gradient(160deg,var(--bg1),var(--bg2));
  min-height:100vh;
}

/* ===== Typography ===== */

h2{
  font-size:15px;
  margin-bottom:14px;
  font-weight:700;
  letter-spacing:-0.3px;
}

/* ===== Mode Button ===== */

.mode-btn{
  width:100%;
  margin-bottom:20px;
  background:linear-gradient(135deg,#6366f1,#4f46e5);
  color:white;
  font-weight:700;
  border:none;
  padding:12px;
  border-radius:16px;
  cursor:pointer;
  box-shadow:
    0 10px 30px rgba(79,70,229,.4);
  transition:.25s ease;
}

.mode-btn:hover{
  transform:translateY(-3px);
  box-shadow:
    0 15px 40px rgba(79,70,229,.55);
}

.mode-btn:active{
  transform:scale(.97);
}

/* ===== Glass Cards ===== */

.card{
  background:var(--glass);
  backdrop-filter:blur(25px);
  -webkit-backdrop-filter:blur(25px);
  padding:20px;
  border-radius:24px;
  margin-bottom:22px;
  border:1px solid var(--glass-border);
  box-shadow:
    0 20px 40px rgba(0,0,0,.35),
    inset 0 1px 0 rgba(255,255,255,.05);
  transition:.3s ease;
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:
    0 30px 60px rgba(0,0,0,.45),
    inset 0 1px 0 rgba(255,255,255,.08);
}

/* ===== Grid ===== */

.grid-2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.grid-3{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
}

/* ===== Labels ===== */

label{
  font-size:11px;
  color:var(--sub);
  font-weight:600;
  letter-spacing:.3px;
}

/* ===== Inputs ===== */

input{
  width:100%;
  padding:11px;
  font-size:14px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.05);
  color:var(--text);
  transition:.2s ease;
}

input:focus{
  outline:none;
  border:1px solid var(--accent);
  box-shadow:0 0 0 3px var(--accent-soft);
  background:rgba(255,255,255,.08);
}

/* ===== Result Box ===== */

.result{
  margin-top:14px;
  font-size:13px;
  padding:16px;
  border-radius:16px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);
  line-height:1.6;
  box-shadow:inset 0 2px 6px rgba(0,0,0,.3);
}

.hidden{display:none}

/* ============================= */
/*        CALCULATOR UI         */
/* ============================= */

.calc-display{
  background:linear-gradient(145deg,#0f172a,#1e293b);
  color:#00ffcc;
  padding:16px;
  font-size:22px;
  border-radius:18px;
  margin-bottom:6px;
  word-break:break-all;
  box-shadow:
    inset 6px 6px 12px rgba(0,0,0,.6),
    inset -4px -4px 8px rgba(255,255,255,.03);
}

.calc-preview{
  background:rgba(255,255,255,.05);
  color:#22d3ee;
  padding:12px;
  font-size:14px;
  border-radius:14px;
  margin-bottom:16px;
  border:1px solid rgba(255,255,255,.08);
}

.calc-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
}

/* ===== Neumorphism Buttons ===== */

.calc-grid button{
  background:linear-gradient(145deg,#1e293b,#0f172a);
  color:#f8fafc;
  font-size:17px;
  padding:16px 0;
  border:none;
  border-radius:20px;
  cursor:pointer;
  box-shadow:
    8px 8px 18px rgba(0,0,0,.6),
    -6px -6px 14px rgba(255,255,255,.03);
  transition:.2s ease;
}

.calc-grid button:hover{
  box-shadow:
    10px 10px 24px rgba(0,0,0,.7),
    -8px -8px 16px rgba(255,255,255,.04);
}

.calc-grid button:active{
  transform:scale(.95);
  box-shadow:
    inset 6px 6px 12px rgba(0,0,0,.6);
}

/* ===== Copy Button ===== */

.copy-btn{
  margin-top:16px;
  background:linear-gradient(135deg,#06b6d4,#3b82f6);
  color:white;
  width:100%;
  padding:13px;
  border-radius:18px;
  font-weight:700;
  border:none;
  cursor:pointer;
  box-shadow:
    0 10px 30px rgba(59,130,246,.4);
  transition:.25s ease;
}

.copy-btn:hover{
  transform:translateY(-3px);
  box-shadow:
    0 15px 40px rgba(59,130,246,.6);
}

.copy-btn:active{
  transform:scale(.97);
}
</style>
</head>

<body>

<button class="mode-btn" onclick="toggleMode()">🔄 Mode Switch</button>

<!-- ================= TIP MODE ================= -->
<div id="tipMode">

<div class="card">
<h2>층별 팁 입력</h2>
<div class="grid-2">
<div><label>1F Cash</label><input type="number" id="f1c"></div>
<div><label>1F Card</label><input type="number" id="f1d"></div>
<div><label>2F Cash</label><input type="number" id="f2c"></div>
<div><label>2F Card</label><input type="number" id="f2d"></div>
<div><label>3F Cash</label><input type="number" id="f3c"></div>
<div><label>3F Card</label><input type="number" id="f3d"></div>
</div>
<label>Extra Tip</label>
<input type="number" id="extra">
</div>

<div class="card">
<h2>퍼센트 분배</h2>
<div class="grid-2">
<div><label>100% 인원</label><input type="number" id="p100"></div>
<div><label>50% 인원</label><input type="number" id="p50"></div>
<div><label>30% 인원</label><input type="number" id="p30"></div>
<div><label>25% 인원</label><input type="number" id="p25"></div>
</div>

<h3 style="font-size:13px;margin-top:10px;">추가 퍼센트</h3>
<div class="grid-3">
<div><label>%</label><input type="number" id="cp1"></div>
<div><label>인원</label><input type="number" id="cp1n"></div>
<div></div>
<div><label>%</label><input type="number" id="cp2"></div>
<div><label>인원</label><input type="number" id="cp2n"></div>
<div></div>
</div>

<div id="percentResult" class="result"></div>
</div>
  <div class="card">
<h2>시간 기준 분배</h2>

<label>총 팁</label>
<input type="number" id="timeTotal">

<div id="timeContainer"></div>

<button onclick="addTimeRow()">+ 사람 추가</button>

<div id="timeResult" class="result"></div>
</div>

</div>

<!-- ================= CALC MODE ================= -->
<div id="calcMode" class="hidden">

<div class="card">
<h2>계산기</h2>

<div id="calcDisplay" class="calc-display">0</div>
<div id="calcPreview" class="calc-preview">= 0</div>

<div class="calc-grid">
<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button onclick="press('/')">÷</button>

<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button onclick="press('*')">×</button>

<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button onclick="press('-')">-</button>

<button onclick="press('0')">0</button>
<button onclick="press('.')">.</button>
<button onclick="calculateFinal()">=</button>
<button onclick="press('+')">+</button>

<button onclick="clearCalc()">C</button>
</div>

<button class="copy-btn" onclick="copyResult()">📋 결과 복사</button>

</div>
</div>

<script>
let currentMode="tip";
function toggleMode(){
  document.getElementById("tipMode").classList.toggle("hidden");
  document.getElementById("calcMode").classList.toggle("hidden");
}

/* -------- TIP -------- */
function val(id){return Number(document.getElementById(id).value)||0;}

function calculate(){
  const total=
    val("f1c")+val("f1d")+
    val("f2c")+val("f2d")+
    val("f3c")+val("f3d")+
    val("extra");

  const groups=[
    {coef:1,count:val("p100"),label:"100%"},
    {coef:0.5,count:val("p50"),label:"50%"},
    {coef:0.3,count:val("p30"),label:"30%"},
    {coef:0.25,count:val("p25"),label:"25%"},
    {coef:val("cp1")/100,count:val("cp1n"),label:val("cp1")+"%"},
    {coef:val("cp2")/100,count:val("cp2n"),label:val("cp2")+"%"},
  ];

  let totalCoef=0;
  groups.forEach(g=>{totalCoef+=g.coef*g.count;});

  let distributed=0;
  let html="총 팁: "+total+"<br>총 계수: "+totalCoef.toFixed(2)+"<br><br>";

  groups.forEach(g=>{
    if(g.count>0 && g.coef>0){
      const one=Math.floor((total/totalCoef)*g.coef);
      const sum=one*g.count;
      distributed+=sum;
      html+=`${g.label} → 1인 ${one} / 합 ${sum}<br>`;
    }
  });

  html+="<br>남은 금액: "+(total-distributed);
  document.getElementById("percentResult").innerHTML=html;
}
document.addEventListener("input",calculate);
let timeCount=0;
const maxTimePeople=8;

function addTimeRow(){
  if(timeCount>=maxTimePeople) return;

  const div=document.createElement("div");
  div.className="grid-2";
  div.innerHTML=`
    <div>
      <label>시간</label>
      <input type="number" class="timeHours">
    </div>
    <div>
      <label>인원</label>
      <input type="number" class="timePeople">
    </div>
  `;
  document.getElementById("timeContainer").appendChild(div);
  timeCount++;
}

function calculateTime(){

  const total=Number(document.getElementById("timeTotal").value)||0;
  const hourInputs=[...document.querySelectorAll(".timeHours")];
  const peopleInputs=[...document.querySelectorAll(".timePeople")];

  let totalHours=0;

  for(let i=0;i<hourInputs.length;i++){
    const hours=Number(hourInputs[i].value)||0;
    const people=Number(peopleInputs[i].value)||0;
    totalHours += hours*people;
  }
calculateTime();
  if(totalHours===0){
    document.getElementById("timeResult").innerHTML="";
    return;
  }

  const perHour=Math.floor(total/totalHours);

  let distributed=0;
  let html=`총 시간: ${totalHours}<br>`;
  html+=`시간당 금액: ${perHour}<br><br>`;

  for(let i=0;i<hourInputs.length;i++){
    const hours=Number(hourInputs[i].value)||0;
    const people=Number(peopleInputs[i].value)||0;

    if(hours>0 && people>0){
      const amount=perHour*hours;
      const groupTotal=amount*people;
      distributed+=groupTotal;

      html+=`시간 ${hours}h / ${people}명 → 1인 ${amount} / 합 ${groupTotal}<br>`;
    }
  }

  html+=`<br>남은 금액: ${total-distributed}`;

  document.getElementById("timeResult").innerHTML=html;
}
/* -------- CALC -------- */
let expression="";

function press(val){
  expression+=val;
  updateCalc();
}

function updateCalc(){
  document.getElementById("calcDisplay").innerText=expression||"0";
  try{
    const preview=eval(expression);
    document.getElementById("calcPreview").innerText="= "+preview;
  }catch{
    document.getElementById("calcPreview").innerText="= ?";
  }
}

function calculateFinal(){
  try{
    expression=eval(expression).toString();
  }catch{
    expression="Error";
  }
  updateCalc();
}

function clearCalc(){
  expression="";
  updateCalc();
}

function copyResult(){
  navigator.clipboard.writeText(expression);
  alert("결과 복사 완료");
}
</script>

</body>
</html>
